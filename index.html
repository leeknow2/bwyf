<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간업무보고 입력폼</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #2e7d9a;
    --light: #f0f4f8;
    --border: #c8d8e8;
    --text: #1e2a38;
    --muted: #6b7f93;
    --success: #2a7a4b;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; background: #e8eef5; color: var(--text); min-height: 100vh; }

  /* 헤더 */
  .header {
    background: var(--primary);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-icon { font-size: 28px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; opacity: 0.75; margin-top: 2px; }

  /* 레이아웃 */
  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }

  /* 카드 */
  .card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-header {
    background: var(--primary);
    color: white;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .badge {
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .card-header.sub { background: var(--accent); font-size: 14px; }
  .card-body { padding: 20px; }

  /* 폼 요소 */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group label .req { color: var(--danger); margin-left: 2px; }
  input[type="text"], textarea, select {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fafcff;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(46,125,154,0.12);
    background: white;
  }
  textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

  /* 업무 항목 블록 */
  .work-block {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .work-block-header {
    background: var(--light);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    border-bottom: 1.5px solid var(--border);
  }
  .work-block-body { padding: 16px; }

  /* 버튼 */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-add {
    background: var(--light);
    color: var(--accent);
    border: 1.5px dashed var(--accent);
    width: 100%;
    justify-content: center;
    margin-top: 4px;
  }
  .btn-add:hover { background: #e0eef5; }
  .btn-remove {
    background: none;
    color: var(--danger);
    border: 1px solid #f0b8b0;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 4px;
  }
  .btn-remove:hover { background: #fdf0ef; }
  .btn-primary {
    background: var(--primary);
    color: white;
    padding: 14px 32px;
    font-size: 15px;
    border-radius: 8px;
  }
  .btn-primary:hover { background: #152e4d; box-shadow: 0 4px 12px rgba(26,58,92,0.3); }
  .btn-secondary {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
    padding: 14px 24px;
    font-size: 15px;
    border-radius: 8px;
  }
  .btn-secondary:hover { background: var(--light); }

  /* 하단 버튼 영역 */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 2px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    z-index: 100;
  }

  /* 미리보기 */
  #preview-area {
    display: none;
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 32px 40px;
    font-family: '휴먼명조', '맑은 고딕', serif;
    line-height: 1.8;
    font-size: 14px;
    margin-bottom: 20px;
  }
  #preview-area .doc-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  #preview-area .doc-dept { text-align: center; font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  #preview-area .section-title { font-size: 15px; font-weight: 700; margin: 20px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
  #preview-area .work-item { margin-left: 12px; margin-bottom: 12px; }
  #preview-area .work-title { font-weight: 700; margin-bottom: 4px; }
  #preview-area .work-sub { color: var(--muted); margin-left: 8px; margin-bottom: 4px; }
  #preview-area .work-detail { margin-left: 16px; margin-bottom: 2px; }
  #preview-area .work-detail span { font-weight: 700; }

  /* 알림 */
  .toast {
    position: fixed;
    top: 24px; right: 24px;
    background: var(--success);
    color: white;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transform: translateY(-80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* 도움말 */
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .section-divider { border: none; border-top: 2px dashed var(--border); margin: 24px 0; }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>월간업무보고 작성 시스템</h1>
    <p>내용을 입력하면 양식에 맞춰 HWPX 파일로 자동 생성됩니다</p>
  </div>
</div>

<div class="container">

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-header">📌 기본 정보</div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label>보고 기관(센터)명 <span class="req">*</span></label>
          <input type="text" id="dept" placeholder="예: 부천시청소년센터" />
        </div>
        <div class="form-group">
          <label>보고 월 <span class="req">*</span></label>
          <select id="month">
            <option value="">선택</option>
            <option value="1">1월</option><option value="2">2월</option>
            <option value="3">3월</option><option value="4">4월</option>
            <option value="5">5월</option><option value="6">6월</option>
            <option value="7" selected>7월</option><option value="8">8월</option>
            <option value="9">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>작성자</label>
          <input type="text" id="author" placeholder="홍길동" />
        </div>
        <div class="form-group">
          <label>작성일</label>
          <input type="text" id="write-date" placeholder="예: 2026. 7. 31." />
        </div>
      </div>
    </div>
  </div>

  <!-- 월간 핵심 주요업무 -->
  <div class="card">
    <div class="card-header">
      □ 월간 핵심 주요업무
      <span class="badge">해당 월 대표 업무</span>
    </div>
    <div class="card-body">
      <div id="core-works-container"></div>
      <button class="btn btn-add" onclick="addWork('core')">＋ 업무 항목 추가</button>
    </div>
  </div>

  <!-- 기관운영 -->
  <div class="card">
    <div class="card-header">□ 기관운영</div>
    <div class="card-body">
      <div id="org-works-container"></div>
      <button class="btn btn-add" onclick="addWork('org')">＋ 업무 항목 추가</button>
    </div>
  </div>

  <!-- 사업운영 -->
  <div class="card">
    <div class="card-header">□ 사업운영</div>
    <div class="card-body">
      <div id="biz-works-container"></div>
      <button class="btn btn-add" onclick="addWork('biz')">＋ 업무 항목 추가</button>
    </div>
  </div>

  <!-- 공간 이용실적 -->
  <div class="card">
    <div class="card-header">□ 공간 이용실적</div>
    <div class="card-body">
      <div class="form-row single">
        <div class="form-group">
          <label>연 누적 이용 인원 (명)</label>
          <input type="text" id="total-users" placeholder="예: 연 1,871명 이용" />
          <p class="hint">※ 큰 제목 괄호 안에 들어갈 전체 누적실적을 입력하세요</p>
        </div>
      </div>
      <div id="usage-table-container">
        <div style="overflow-x:auto; margin-top:12px;">
          <table id="usage-table" style="width:100%; border-collapse:collapse; font-size:13px;">
            <thead>
              <tr style="background:var(--primary); color:white;">
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">구분</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">1월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">2월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">3월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">4월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">5월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">6월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">7월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">소계</th>
              </tr>
            </thead>
            <tbody id="usage-tbody"></tbody>
          </table>
        </div>
        <button class="btn btn-add" style="margin-top:12px;" onclick="addUsageRow()">＋ 공간/시설 행 추가</button>
      </div>
    </div>
  </div>

  <!-- 미리보기 -->
  <div id="preview-area"></div>

</div>

<!-- 하단 버튼 -->
<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="togglePreview()">👁 미리보기</button>
  <button class="btn btn-primary" onclick="downloadHWPX()">⬇ HWPX 파일 다운로드</button>
</div>

<div class="toast" id="toast"></div>

<script>
let workCounters = { core: 0, org: 0, biz: 0 };
let usageRowCount = 0;

// ─── 업무 항목 추가 ───────────────────────────────────────────
function addWork(type) {
  const n = ++workCounters[type];
  const container = document.getElementById(`${type}-works-container`);
  const typeLabel = { core: '핵심업무', org: '기관운영', biz: '사업운영' }[type];

  const div = document.createElement('div');
  div.className = 'work-block';
  div.id = `${type}-work-${n}`;
  div.innerHTML = `
    <div class="work-block-header">
      <span>${typeLabel} ${n}번 항목</span>
      <button class="btn btn-remove" onclick="removeWork('${type}', ${n})">✕ 삭제</button>
    </div>
    <div class="work-block-body">
      <div class="form-row single">
        <div class="form-group">
          <label>제목 (헤드라인) <span class="req">*</span></label>
          <input type="text" id="${type}-title-${n}" placeholder="예: 제19회 숲속의 행복나눔 축제" />
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>부연설명 (➲)</label>
          <input type="text" id="${type}-sub-${n}" placeholder="예: 공동주관: 부천시, 부천교육지원청, 산울림청소년센터" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>〇 일시/장소</label>
          <input type="text" id="${type}-datetime-${n}" placeholder="예: 7. 5.(토) 10:00~17:00 / 시청 잔디광장" />
        </div>
        <div class="form-group">
          <label>〇 대　　상</label>
          <input type="text" id="${type}-target-${n}" placeholder="예: 지역 청소년 등 시민 약 1,000명" />
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>〇 주요내용</label>
          <textarea id="${type}-content-${n}" placeholder="예: 개막식, 유공자 표창, 환경 체험부스, 청소년 그린타임 등"></textarea>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>〇 기타 (대표이사님 하실 일 등, 선택)</label>
          <input type="text" id="${type}-etc-${n}" placeholder="예: 대표이사님 하실 일: 행사 참석 ※ 부서장 포함" />
        </div>
      </div>
    </div>`;
  container.appendChild(div);
}

function removeWork(type, n) {
  const el = document.getElementById(`${type}-work-${n}`);
  if (el) el.remove();
}

// ─── 공간 이용실적 행 추가 ───────────────────────────────────
function addUsageRow() {
  const n = ++usageRowCount;
  const tbody = document.getElementById('usage-tbody');
  const tr = document.createElement('tr');
  tr.id = `usage-row-${n}`;
  tr.innerHTML = `
    <td style="border:1px solid #ccc; padding:6px 4px;">
      <input type="text" id="usage-name-${n}" placeholder="공간명" style="width:100%; border:none; background:transparent; font-size:13px;" />
    </td>
    ${[1,2,3,4,5,6,7].map(m => `
    <td style="border:1px solid #ccc; padding:6px 4px;">
      <input type="text" id="usage-m${m}-${n}" placeholder="0" style="width:60px; border:none; background:transparent; font-size:13px; text-align:center;" />
    </td>`).join('')}
    <td style="border:1px solid #ccc; padding:6px 4px; text-align:center; color:var(--muted); font-size:12px;">자동</td>
    <td style="border:1px solid #ccc; padding:4px; text-align:center;">
      <button class="btn btn-remove" onclick="removeUsageRow(${n})" style="padding:2px 8px; font-size:11px;">✕</button>
    </td>`;
  tbody.appendChild(tr);
}

function removeUsageRow(n) {
  const el = document.getElementById(`usage-row-${n}`);
  if (el) el.remove();
}

// ─── 데이터 수집 ─────────────────────────────────────────────
function collectData() {
  const dept = document.getElementById('dept').value.trim();
  const month = document.getElementById('month').value;
  const author = document.getElementById('author').value.trim();
  const writeDate = document.getElementById('write-date').value.trim();

  const collectWorks = (type) => {
    const works = [];
    for (let i = 1; i <= workCounters[type]; i++) {
      const el = document.getElementById(`${type}-work-${i}`);
      if (!el) continue;
      const title = document.getElementById(`${type}-title-${i}`)?.value.trim();
      if (!title) continue;
      works.push({
        title,
        sub: document.getElementById(`${type}-sub-${i}`)?.value.trim() || '',
        datetime: document.getElementById(`${type}-datetime-${i}`)?.value.trim() || '',
        target: document.getElementById(`${type}-target-${i}`)?.value.trim() || '',
        content: document.getElementById(`${type}-content-${i}`)?.value.trim() || '',
        etc: document.getElementById(`${type}-etc-${i}`)?.value.trim() || '',
      });
    }
    return works;
  };

  const usageRows = [];
  for (let i = 1; i <= usageRowCount; i++) {
    const el = document.getElementById(`usage-row-${i}`);
    if (!el) continue;
    const name = document.getElementById(`usage-name-${i}`)?.value.trim();
    if (!name) continue;
    const months = [1,2,3,4,5,6,7].map(m => document.getElementById(`usage-m${m}-${i}`)?.value.trim() || '');
    usageRows.push({ name, months });
  }

  return {
    dept, month, author, writeDate,
    totalUsers: document.getElementById('total-users').value.trim(),
    coreWorks: collectWorks('core'),
    orgWorks: collectWorks('org'),
    bizWorks: collectWorks('biz'),
    usageRows,
  };
}

// ─── 미리보기 ─────────────────────────────────────────────────
function togglePreview() {
  const area = document.getElementById('preview-area');
  if (area.style.display === 'block') {
    area.style.display = 'none';
    return;
  }
  const d = collectData();
  if (!d.dept || !d.month) { showToast('기관명과 보고 월을 입력해주세요', true); return; }
  area.style.display = 'block';
  area.innerHTML = buildPreviewHTML(d);
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildPreviewHTML(d) {
  const renderWorks = (works) => works.map(w => `
    <div class="work-item">
      <div class="work-title"> ${w.title}</div>
      ${w.sub ? `<div class="work-sub">  ➲ ${w.sub}</div>` : ''}
      ${w.datetime ? `<div class="work-detail">〇 <span>일시/장소:</span> ${w.datetime}</div>` : ''}
      ${w.target ? `<div class="work-detail">〇 <span>대　　상:</span> ${w.target}</div>` : ''}
      ${w.content ? `<div class="work-detail">〇 <span>주요내용:</span> ${w.content}</div>` : ''}
      ${w.etc ? `<div class="work-detail">〇 ${w.etc}</div>` : ''}
    </div>`).join('');

  return `
    <div class="doc-title">&lt;${d.month}월 월간업무보고&gt;</div>
    <div class="doc-dept">&lt;${d.dept}&gt;</div>
    ${d.coreWorks.length ? `<div class="section-title">□ 월간 핵심 주요업무</div>${renderWorks(d.coreWorks)}` : ''}
    ${d.orgWorks.length ? `<div class="section-title">□ 기관운영</div>${renderWorks(d.orgWorks)}` : ''}
    ${d.bizWorks.length ? `<div class="section-title">□ 사업운영</div>${renderWorks(d.bizWorks)}` : ''}
    ${d.usageRows.length ? `<div class="section-title">□ 공간 이용실적${d.totalUsers ? ` (${d.totalUsers})` : ''}</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;">
      <thead><tr style="background:#f0f4f8;">
        <th style="border:1px solid #ccc;padding:8px;text-align:center;">구분</th>
        ${[1,2,3,4,5,6,7].map(m=>`<th style="border:1px solid #ccc;padding:8px;text-align:center;">${m}월</th>`).join('')}
        <th style="border:1px solid #ccc;padding:8px;text-align:center;">소계</th>
      </tr></thead>
      <tbody>${d.usageRows.map(r => {
        const total = r.months.reduce((s,v) => s + (parseInt(v)||0), 0);
        return `<tr>
          <td style="border:1px solid #ccc;padding:8px;text-align:center;font-weight:700;">${r.name}</td>
          ${r.months.map(v=>`<td style="border:1px solid #ccc;padding:8px;text-align:center;">${v||''}</td>`).join('')}
          <td style="border:1px solid #ccc;padding:8px;text-align:center;font-weight:700;">${total||''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : ''}
    ${d.author || d.writeDate ? `<div style="text-align:right;margin-top:24px;color:var(--muted);font-size:13px;">작성자: ${d.author} &nbsp; ${d.writeDate}</div>` : ''}`;
}

// ─── HWPX 생성 ───────────────────────────────────────────────
// 이 부분은 실제 한컴오피스(한글)에서 저장한 hwpx 샘플 파일의 구조를
// 그대로 가져와서 만들었습니다 (header.xml은 그 파일에서 추출한 것을
// hwpx-header.xml 이라는 별도 파일로 그대로 사용합니다).
async function downloadHWPX() {
  const d = collectData();
  if (!d.dept) { showToast('기관(센터)명을 입력해주세요', true); return; }
  if (!d.month) { showToast('보고 월을 선택해주세요', true); return; }

  showToast('HWPX 파일 생성 중...');

  let headerXML;
  try {
    const res = await fetch('hwpx-header.xml');
    if (!res.ok) throw new Error('hwpx-header.xml 응답 오류: ' + res.status);
    headerXML = await res.text();
  } catch (e) {
    showToast('hwpx-header.xml 파일을 찾을 수 없어요. index.html과 같은 폴더에 올려주세요.', true);
    console.error(e);
    return;
  }

  const sectionXML = buildSectionXML(d);
  const hpf = buildHPF(d);

  try {
    const zip = new JSZip();
    // mimetype은 항상 첫 번째 항목 + 무압축(STORE)
    zip.file('mimetype', 'application/hwp+zip', { compression: 'STORE' });
    zip.file('version.xml', buildVersionXML());
    zip.file('settings.xml', buildSettingsXML());
    zip.file('META-INF/container.xml', buildContainerXML());
    zip.file('META-INF/manifest.xml', buildManifestXML());
    zip.file('META-INF/container.rdf', buildContainerRDF());
    zip.file('Preview/PrvText.txt', buildPreviewText(d));
    zip.file('Contents/content.hpf', hpf);
    zip.file('Contents/header.xml', headerXML); // 실제 한글이 만든 header.xml 그대로
    zip.file('Contents/section0.xml', sectionXML);

    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/hwp+zip' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${d.month}월_월간업무보고_${d.dept}.hwpx`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 1000);
    showToast('✅ 다운로드 완료!');
  } catch(e) {
    showToast('오류 발생: ' + e.message, true);
    console.error(e);
  }
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// paraPrIDRef / charPrIDRef 조합은 실제 양식 파일(월간업무보고_양식.hwpx)을
// 직접 분석해서 추출한 값입니다. header.xml도 같은 파일에서 꺼낸 것이므로 ID가 일치합니다.
//
// 폰트 참조: hangulFont 7=휴먼명조, 10=HY헤드라인M, 12=한양중고딕, 2=맑은고딕, 3=바탕
// charPr 26: HY헤드라인M 35pt #262626  → 문서 제목
// charPr 14: 바탕 10pt               → 부서명 / 일반 빈 줄
// charPr 22: 바탕 2pt                → 구분용 초소형 빈 줄
// charPr 40: HY헤드라인M 18pt #231E7E → □ 섹션 제목 (진남색)
// charPr 16: HY헤드라인M 16pt         → 업무 헤드라인
// charPr 52: 한양중고딕 13pt          → ➲ 부연설명
// charPr 27: 휴먼명조 15pt            → 〇 일시/장소·대상·주요내용 본문
// charPr 33: 휴먼명조 15pt            → 주요내용 본문(내용 텍스트)
// charPr 29: 휴먼명조 15pt            → 사업운영 가/나 항목명

const STYLE = {
  SECPR:     { p: 2,  c: 14 }, // secPr 담는 첫 단락 (paraPr=2: RIGHT 정렬)
  EMPTY_SM:  { p: 20, c: 22 }, // 구분용 초소형 빈 줄 (2pt)
  EMPTY:     { p: 20, c: 14 }, // 일반 빈 줄 (10pt 바탕)
  TITLE:     { p: 56, c: 26 }, // 문서 제목 — CENTER, HY헤드라인M 35pt
  DEPT:      { p: 2,  c: 14 }, // 부서명 — RIGHT (paraPr=2), 바탕 10pt
  SECTION:   { p: 57, c: 40 }, // □ 섹션 제목 — LEFT, HY헤드라인M 18pt 진남색
  HEADLINE:  { p: 20, c: 16 }, // 업무 항목 헤드라인 — HY헤드라인M 16pt
  BIZ_HEAD:  { p: 21, c: 16 }, // 사업운영 메인 헤드라인 (paraPr=21: LEFT)
  BIZ_SUB:   { p: 66, c: 29 }, // 사업운영 가/나/다 항목명 — 휴먼명조 15pt
  SUB:       { p: 73, c: 52 }, // ➲ 부연설명 — 한양중고딕 13pt
  DATETIME:  { p: 58, c: 27 }, // 〇 일시/장소 — 휴먼명조 15pt
  TARGET:    { p: 59, c: 27 }, // 〇 대    상 — 휴먼명조 15pt
  CONTENT:   { p: 60, c: 27 }, // 〇 주요내용 — 휴먼명조 15pt
  ETC:       { p: 59, c: 27 }, // 〇 기타 항목 — 휴먼명조 15pt
  BODY:      { p: 50, c: 27 }, // 일반 본문 — 휴먼명조 15pt
};

// 문서 내 모든 문단은 고유 id가 있어야 하므로 빌드할 때마다 카운터를 새로 둠
let _paraIdCounter = 1000000000;

function para(text, style, extraRunContent = '') {
  _paraIdCounter++;
  const head = `<hp:p id="${_paraIdCounter}" paraPrIDRef="${style.p}" styleIDRef="0" pageBreak="0" columnBreak="0" merged="0">`;
  if (!text && !extraRunContent) {
    // 빈 문단은 실제 한글 파일과 동일하게 <hp:t> 없이 run만 self-close
    return `${head}<hp:run charPrIDRef="${style.c}"/></hp:p>`;
  }
  return `${head}<hp:run charPrIDRef="${style.c}">${extraRunContent}<hp:t>${esc(text)}</hp:t></hp:run></hp:p>`;
}

// 첫 문단의 첫 run에 들어가는 secPr(용지설정)+colPr(단설정).
// 이 블록은 실제 한글이 만든 hwpx 파일에서 그대로 추출한 내용입니다
// (손으로 만든 게 아니라 진짜 한글 프로그램이 쓴 XML 원본).
const SEC_PR_BLOCK = `<hp:secPr id="" textDirection="HORIZONTAL" spaceColumns="1134" tabStop="8000" tabStopVal="4000" tabStopUnit="HWPUNIT" outlineShapeIDRef="1" memoShapeIDRef="0" textVerticalWidthHead="0" masterPageCnt="0"><hp:grid lineGrid="0" charGrid="0" wonggojiFormat="0"/><hp:startNum pageStartsOn="BOTH" page="0" pic="0" tbl="0" equation="0"/><hp:visibility hideFirstHeader="0" hideFirstFooter="0" hideFirstMasterPage="0" border="SHOW_ALL" fill="SHOW_ALL" hideFirstPageNum="0" hideFirstEmptyLine="0" showLineNumber="0"/><hp:lineNumberShape restartType="0" countBy="0" distance="0" startNumber="0"/><hp:pagePr landscape="WIDELY" width="59528" height="84188" gutterType="LEFT_ONLY"><hp:margin header="2834" footer="2834" gutter="0" left="5669" right="5669" top="4251" bottom="4251"/></hp:pagePr><hp:footNotePr><hp:autoNumFormat type="DIGIT" userChar="" prefixChar="" suffixChar=")" supscript="0"/><hp:noteLine length="-1" type="SOLID" width="0.1 mm" color="#000000"/><hp:noteSpacing betweenNotes="850" belowLine="567" aboveLine="567"/><hp:numbering type="CONTINUOUS" newNum="1"/><hp:placement place="EACH_COLUMN" beneathText="0"/></hp:footNotePr><hp:endNotePr><hp:autoNumFormat type="DIGIT" userChar="" prefixChar="" suffixChar=")" supscript="0"/><hp:noteLine length="-1" type="SOLID" width="0.1 mm" color="#000000"/><hp:noteSpacing betweenNotes="850" belowLine="567" aboveLine="567"/><hp:numbering type="CONTINUOUS" newNum="1"/><hp:placement place="END_OF_DOCUMENT" beneathText="0"/></hp:endNotePr><hp:pageBorderFill type="BOTH" borderFillIDRef="1" textBorder="PAPER" headerInside="0" footerInside="0" fillArea="PAPER"><hp:offset left="1417" right="1417" top="1417" bottom="1417"/></hp:pageBorderFill><hp:pageBorderFill type="EVEN" borderFillIDRef="1" textBorder="PAPER" headerInside="0" footerInside="0" fillArea="PAPER"><hp:offset left="1417" right="1417" top="1417" bottom="1417"/></hp:pageBorderFill><hp:pageBorderFill type="ODD" borderFillIDRef="1" textBorder="PAPER" headerInside="0" footerInside="0" fillArea="PAPER"><hp:offset left="1417" right="1417" top="1417" bottom="1417"/></hp:pageBorderFill></hp:secPr><hp:ctrl><hp:colPr id="" type="NEWSPAPER" layout="LEFT" colCount="1" sameSz="1" sameGap="0"/></hp:ctrl>`;

function buildSectionXML(d) {
  _paraIdCounter = 1000000000;
  let body = '';

  // ── 실제 양식과 동일한 문서 머리 구조 ──────────────────────────────
  // [000] paraPr=2  secPr 포함 빈 단락  (RIGHT 정렬, secPr+colPr 담는 단락)
  // [001] paraPr=20 초소형(2pt) 빈 줄
  // [002] paraPr=20 일반 빈 줄
  // [003] paraPr=56 제목 "7월 월간업무보고"  (CENTER, HY헤드라인M 35pt)
  // [004] paraPr=20 빈 줄
  // [005] paraPr=2  부서명  (RIGHT 정렬)
  body += para('', STYLE.SECPR, SEC_PR_BLOCK);   // secPr는 여기 들어감
  body += para('', STYLE.EMPTY_SM);
  body += para('', STYLE.EMPTY);
  body += para(`<${d.month}월 월간업무보고>`, STYLE.TITLE);
  body += para('', STYLE.EMPTY);
  body += para(d.dept, STYLE.DEPT);

  // ── 핵심 주요업무 / 기관운영 공통 렌더러 ─────────────────────────
  // paraPr=20 charPr=16: 업무 헤드라인 (HY헤드라인M 16pt)
  // paraPr=73 charPr=52: ➲ 부연설명 (한양중고딕 13pt)
  // paraPr=58 charPr=27: 〇 일시/장소 (휴먼명조 15pt)
  // paraPr=59 charPr=27: 〇 대    상  (휴먼명조 15pt)
  // paraPr=60 charPr=27: 〇 주요내용  (휴먼명조 15pt)
  const renderCoreOrg = (works) => {
    let out = '';
    works.forEach(w => {
      out += para(` ${w.title}`, STYLE.HEADLINE);
      if (w.sub)     out += para(`  ➲ ${w.sub}`, STYLE.SUB);
      if (w.datetime) out += para(` 〇 일시/장소: ${w.datetime}`, STYLE.DATETIME);
      if (w.target)   out += para(` 〇 대\u00a0\u00a0\u00a0\u00a0상: ${w.target}`, STYLE.TARGET);
      if (w.content)  out += para(` 〇 주요내용: ${w.content}`, STYLE.CONTENT);
      if (w.etc)      out += para(` 〇 ${w.etc}`, STYLE.ETC);
      out += para('', STYLE.EMPTY);
    });
    return out;
  };

  // ── 사업운영 렌더러 (가/나/다 순번 포함) ─────────────────────────
  // paraPr=21 charPr=16: 사업 대표 제목 (업무 헤드라인과 동일 폰트/크기)
  // paraPr=66 charPr=29: 가. 나. 다. 세부 항목명 (휴먼명조 15pt)
  // paraPr=50 charPr=27: 〇 세부 항목 내용 (휴먼명조 15pt)
  const KA_LIST = ['가','나','다','라','마','바','사','아','자','차'];
  const renderBiz = (works) => {
    let out = '';
    // 사업운영은 가/나/다 번호를 붙여서 출력 (첫 항목이 메인 헤드라인, 나머지는 하위)
    if (works.length === 1) {
      // 항목이 하나면 단독 헤드라인으로
      const w = works[0];
      out += para(` ${w.title}`, STYLE.BIZ_HEAD);
      if (w.sub)      out += para(`  ➲ ${w.sub}`, STYLE.SUB);
      if (w.datetime) out += para(` 〇 일시/장소: ${w.datetime}`, STYLE.BODY);
      if (w.target)   out += para(` 〇 대\u00a0\u00a0\u00a0\u00a0상: ${w.target}`, STYLE.BODY);
      if (w.content)  out += para(` 〇 주요내용: ${w.content}`, STYLE.BODY);
      if (w.etc)      out += para(` 〇 ${w.etc}`, STYLE.BODY);
      out += para('', STYLE.EMPTY);
    } else {
      works.forEach((w, idx) => {
        const ka = KA_LIST[idx] || String(idx + 1);
        out += para(`${ka}. ${w.title}`, STYLE.BIZ_SUB);
        if (w.sub)      out += para(`  ➲ ${w.sub}`, STYLE.SUB);
        if (w.datetime) out += para(` 〇 일시/장소: ${w.datetime}`, STYLE.BODY);
        if (w.target)   out += para(` 〇 대\u00a0\u00a0\u00a0\u00a0상: ${w.target}`, STYLE.BODY);
        if (w.content)  out += para(` 〇 주요내용: ${w.content}`, STYLE.BODY);
        if (w.etc)      out += para(` 〇 ${w.etc}`, STYLE.BODY);
        out += para('', STYLE.EMPTY);
      });
    }
    return out;
  };

  if (d.coreWorks.length) {
    body += para('□ 월간 핵심 주요업무', STYLE.SECTION);
    body += renderCoreOrg(d.coreWorks);
  }
  if (d.orgWorks.length) {
    body += para('□ 기관운영', STYLE.SECTION);
    body += renderCoreOrg(d.orgWorks);
  }
  if (d.bizWorks.length) {
    body += para('□ 사업운영', STYLE.SECTION);
    body += renderBiz(d.bizWorks);
  }

  if (d.usageRows.length) {
    const totalLabel = d.totalUsers ? `(${d.totalUsers})` : '';
    body += para(`□ 공간 이용실적 ${totalLabel}`.trim(), STYLE.SECTION);
    // 이용실적: 탭 구분 텍스트 표 (실제 표(hp:tbl) 대신 텍스트 형태로 단순화)
    const months = ['1월','2월','3월','4월','5월','6월','7월'];
    body += para(['구분', ...months, '소계'].join('\t'), STYLE.BODY);
    d.usageRows.forEach(r => {
      const total = r.months.reduce((s, v) => s + (parseInt(v) || 0), 0);
      body += para([r.name, ...r.months, total || ''].join('\t'), STYLE.BODY);
    });
    body += para('', STYLE.EMPTY);
  }

  if (d.author || d.writeDate) {
    body += para(`작성자: ${d.author}　　${d.writeDate}`, STYLE.BODY);
  }

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<hs:sec xmlns:ha="http://www.hancom.co.kr/hwpml/2011/app" xmlns:hp="http://www.hancom.co.kr/hwpml/2011/paragraph" xmlns:hp10="http://www.hancom.co.kr/hwpml/2016/paragraph" xmlns:hs="http://www.hancom.co.kr/hwpml/2011/section" xmlns:hc="http://www.hancom.co.kr/hwpml/2011/core" xmlns:hh="http://www.hancom.co.kr/hwpml/2011/head" xmlns:hhs="http://www.hancom.co.kr/hwpml/2011/history" xmlns:hm="http://www.hancom.co.kr/hwpml/2011/master-page" xmlns:hpf="http://www.hancom.co.kr/schema/2011/hpf" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:opf="http://www.idpf.org/2007/opf/" xmlns:ooxmlchart="http://www.hancom.co.kr/hwpml/2016/ooxmlchart" xmlns:hwpunitchar="http://www.hancom.co.kr/hwpml/2016/HwpUnitChar" xmlns:epub="http://www.idpf.org/2007/ops" xmlns:config="urn:oasis:names:tc:opendocument:xmlns:config:1.0">${body}</hs:sec>`;
}

function buildHPF(d) {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<opf:package xmlns:opf="http://www.idpf.org/2007/opf/" xmlns:dc="http://purl.org/dc/elements/1.1/" version="" unique-identifier="" id="">
  <opf:metadata>
    <opf:title>${esc(d.month)}월 월간업무보고 - ${esc(d.dept)}</opf:title>
    <opf:language>ko</opf:language>
    <opf:meta name="creator" content="text">${esc(d.author)}</opf:meta>
  </opf:metadata>
  <opf:manifest>
    <opf:item id="header" href="Contents/header.xml" media-type="application/xml"/>
    <opf:item id="section0" href="Contents/section0.xml" media-type="application/xml"/>
    <opf:item id="settings" href="settings.xml" media-type="application/xml"/>
  </opf:manifest>
  <opf:spine>
    <opf:itemref idref="header" linear="yes"/>
    <opf:itemref idref="section0" linear="yes"/>
  </opf:spine>
</opf:package>`;
}

  const now = new Date();
  document.getElementById('write-date').value =
    `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}.`;
});
</script>
