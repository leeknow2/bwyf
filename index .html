<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월간업무보고 입력폼</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --primary: #1a3a5c;
    --accent: #2e7d9a;
    --light: #f0f4f8;
    --border: #c8d8e8;
    --text: #1e2a38;
    --muted: #6b7f93;
    --success: #2a7a4b;
    --danger: #c0392b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: '맑은 고딕', 'Malgun Gothic', sans-serif; background: #e8eef5; color: var(--text); min-height: 100vh; }

  /* 헤더 */
  .header {
    background: var(--primary);
    color: white;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-icon { font-size: 28px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header p { font-size: 13px; opacity: 0.75; margin-top: 2px; }

  /* 레이아웃 */
  .container { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }

  /* 카드 */
  .card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .card-header {
    background: var(--primary);
    color: white;
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .badge {
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 500;
  }
  .card-header.sub { background: var(--accent); font-size: 14px; }
  .card-body { padding: 20px; }

  /* 폼 요소 */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-row.single { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group label .req { color: var(--danger); margin-left: 2px; }
  input[type="text"], textarea, select {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: #fafcff;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  input[type="text"]:focus, textarea:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(46,125,154,0.12);
    background: white;
  }
  textarea { resize: vertical; min-height: 72px; line-height: 1.6; }

  /* 업무 항목 블록 */
  .work-block {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .work-block-header {
    background: var(--light);
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    font-weight: 700;
    color: var(--primary);
    border-bottom: 1.5px solid var(--border);
  }
  .work-block-body { padding: 16px; }

  /* 버튼 */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-add {
    background: var(--light);
    color: var(--accent);
    border: 1.5px dashed var(--accent);
    width: 100%;
    justify-content: center;
    margin-top: 4px;
  }
  .btn-add:hover { background: #e0eef5; }
  .btn-remove {
    background: none;
    color: var(--danger);
    border: 1px solid #f0b8b0;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 4px;
  }
  .btn-remove:hover { background: #fdf0ef; }
  .btn-primary {
    background: var(--primary);
    color: white;
    padding: 14px 32px;
    font-size: 15px;
    border-radius: 8px;
  }
  .btn-primary:hover { background: #152e4d; box-shadow: 0 4px 12px rgba(26,58,92,0.3); }
  .btn-secondary {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
    padding: 14px 24px;
    font-size: 15px;
    border-radius: 8px;
  }
  .btn-secondary:hover { background: var(--light); }

  /* 하단 버튼 영역 */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 2px solid var(--border);
    padding: 16px 24px;
    display: flex;
    justify-content: center;
    gap: 12px;
    box-shadow: 0 -4px 16px rgba(0,0,0,0.08);
    z-index: 100;
  }

  /* 미리보기 */
  #preview-area {
    display: none;
    background: white;
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 32px 40px;
    font-family: '휴먼명조', '맑은 고딕', serif;
    line-height: 1.8;
    font-size: 14px;
    margin-bottom: 20px;
  }
  #preview-area .doc-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  #preview-area .doc-dept { text-align: center; font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  #preview-area .section-title { font-size: 15px; font-weight: 700; margin: 20px 0 10px; border-left: 4px solid var(--primary); padding-left: 10px; }
  #preview-area .work-item { margin-left: 12px; margin-bottom: 12px; }
  #preview-area .work-title { font-weight: 700; margin-bottom: 4px; }
  #preview-area .work-sub { color: var(--muted); margin-left: 8px; margin-bottom: 4px; }
  #preview-area .work-detail { margin-left: 16px; margin-bottom: 2px; }
  #preview-area .work-detail span { font-weight: 700; }

  /* 알림 */
  .toast {
    position: fixed;
    top: 24px; right: 24px;
    background: var(--success);
    color: white;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    transform: translateY(-80px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* 도움말 */
  .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .section-divider { border: none; border-top: 2px dashed var(--border); margin: 24px 0; }
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.triple { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>월간업무보고 작성 시스템</h1>
    <p>내용을 입력하면 양식에 맞춰 HWPX 파일로 자동 생성됩니다</p>
  </div>
</div>

<div class="container">

  <!-- 기본 정보 -->
  <div class="card">
    <div class="card-header">📌 기본 정보</div>
    <div class="card-body">
      <div class="form-row">
        <div class="form-group">
          <label>보고 기관(센터)명 <span class="req">*</span></label>
          <input type="text" id="dept" placeholder="예: 부천시청소년센터" />
        </div>
        <div class="form-group">
          <label>보고 월 <span class="req">*</span></label>
          <select id="month">
            <option value="">선택</option>
            <option value="1">1월</option><option value="2">2월</option>
            <option value="3">3월</option><option value="4">4월</option>
            <option value="5">5월</option><option value="6">6월</option>
            <option value="7" selected>7월</option><option value="8">8월</option>
            <option value="9">9월</option><option value="10">10월</option>
            <option value="11">11월</option><option value="12">12월</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>작성자</label>
          <input type="text" id="author" placeholder="홍길동" />
        </div>
        <div class="form-group">
          <label>작성일</label>
          <input type="text" id="write-date" placeholder="예: 2026. 7. 31." />
        </div>
      </div>
    </div>
  </div>

  <!-- 월간 핵심 주요업무 -->
  <div class="card">
    <div class="card-header">
      □ 월간 핵심 주요업무
      <span class="badge">해당 월 대표 업무</span>
    </div>
    <div class="card-body">
      <div id="core-works-container"></div>
      <button class="btn btn-add" onclick="addWork('core')">＋ 업무 항목 추가</button>
    </div>
  </div>

  <!-- 기관운영 -->
  <div class="card">
    <div class="card-header">□ 기관운영</div>
    <div class="card-body">
      <div id="org-works-container"></div>
      <button class="btn btn-add" onclick="addWork('org')">＋ 업무 항목 추가</button>
    </div>
  </div>

  <!-- 사업운영 -->
  <div class="card">
    <div class="card-header">□ 사업운영</div>
    <div class="card-body">
      <div id="biz-works-container"></div>
      <button class="btn btn-add" onclick="addWork('biz')">＋ 업무 항목 추가</button>
    </div>
  </div>

  <!-- 공간 이용실적 -->
  <div class="card">
    <div class="card-header">□ 공간 이용실적</div>
    <div class="card-body">
      <div class="form-row single">
        <div class="form-group">
          <label>연 누적 이용 인원 (명)</label>
          <input type="text" id="total-users" placeholder="예: 연 1,871명 이용" />
          <p class="hint">※ 큰 제목 괄호 안에 들어갈 전체 누적실적을 입력하세요</p>
        </div>
      </div>
      <div id="usage-table-container">
        <div style="overflow-x:auto; margin-top:12px;">
          <table id="usage-table" style="width:100%; border-collapse:collapse; font-size:13px;">
            <thead>
              <tr style="background:var(--primary); color:white;">
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">구분</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">1월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">2월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">3월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">4월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">5월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">6월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">7월</th>
                <th style="padding:10px 8px; text-align:center; border:1px solid #ccc;">소계</th>
              </tr>
            </thead>
            <tbody id="usage-tbody"></tbody>
          </table>
        </div>
        <button class="btn btn-add" style="margin-top:12px;" onclick="addUsageRow()">＋ 공간/시설 행 추가</button>
      </div>
    </div>
  </div>

  <!-- 미리보기 -->
  <div id="preview-area"></div>

</div>

<!-- 하단 버튼 -->
<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="togglePreview()">👁 미리보기</button>
  <button class="btn btn-primary" onclick="downloadHWPX()">⬇ HWPX 파일 다운로드</button>
</div>

<div class="toast" id="toast"></div>

<script>
let workCounters = { core: 0, org: 0, biz: 0 };
let usageRowCount = 0;

// ─── 업무 항목 추가 ───────────────────────────────────────────
function addWork(type) {
  const n = ++workCounters[type];
  const container = document.getElementById(`${type}-works-container`);
  const typeLabel = { core: '핵심업무', org: '기관운영', biz: '사업운영' }[type];

  const div = document.createElement('div');
  div.className = 'work-block';
  div.id = `${type}-work-${n}`;
  div.innerHTML = `
    <div class="work-block-header">
      <span>${typeLabel} ${n}번 항목</span>
      <button class="btn btn-remove" onclick="removeWork('${type}', ${n})">✕ 삭제</button>
    </div>
    <div class="work-block-body">
      <div class="form-row single">
        <div class="form-group">
          <label>제목 (헤드라인) <span class="req">*</span></label>
          <input type="text" id="${type}-title-${n}" placeholder="예: 제19회 숲속의 행복나눔 축제" />
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>부연설명 (➲)</label>
          <input type="text" id="${type}-sub-${n}" placeholder="예: 공동주관: 부천시, 부천교육지원청, 산울림청소년센터" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>〇 일시/장소</label>
          <input type="text" id="${type}-datetime-${n}" placeholder="예: 7. 5.(토) 10:00~17:00 / 시청 잔디광장" />
        </div>
        <div class="form-group">
          <label>〇 대　　상</label>
          <input type="text" id="${type}-target-${n}" placeholder="예: 지역 청소년 등 시민 약 1,000명" />
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>〇 주요내용</label>
          <textarea id="${type}-content-${n}" placeholder="예: 개막식, 유공자 표창, 환경 체험부스, 청소년 그린타임 등"></textarea>
        </div>
      </div>
      <div class="form-row single">
        <div class="form-group">
          <label>〇 기타 (대표이사님 하실 일 등, 선택)</label>
          <input type="text" id="${type}-etc-${n}" placeholder="예: 대표이사님 하실 일: 행사 참석 ※ 부서장 포함" />
        </div>
      </div>
    </div>`;
  container.appendChild(div);
}

function removeWork(type, n) {
  const el = document.getElementById(`${type}-work-${n}`);
  if (el) el.remove();
}

// ─── 공간 이용실적 행 추가 ───────────────────────────────────
function addUsageRow() {
  const n = ++usageRowCount;
  const tbody = document.getElementById('usage-tbody');
  const tr = document.createElement('tr');
  tr.id = `usage-row-${n}`;
  tr.innerHTML = `
    <td style="border:1px solid #ccc; padding:6px 4px;">
      <input type="text" id="usage-name-${n}" placeholder="공간명" style="width:100%; border:none; background:transparent; font-size:13px;" />
    </td>
    ${[1,2,3,4,5,6,7].map(m => `
    <td style="border:1px solid #ccc; padding:6px 4px;">
      <input type="text" id="usage-m${m}-${n}" placeholder="0" style="width:60px; border:none; background:transparent; font-size:13px; text-align:center;" />
    </td>`).join('')}
    <td style="border:1px solid #ccc; padding:6px 4px; text-align:center; color:var(--muted); font-size:12px;">자동</td>
    <td style="border:1px solid #ccc; padding:4px; text-align:center;">
      <button class="btn btn-remove" onclick="removeUsageRow(${n})" style="padding:2px 8px; font-size:11px;">✕</button>
    </td>`;
  tbody.appendChild(tr);
}

function removeUsageRow(n) {
  const el = document.getElementById(`usage-row-${n}`);
  if (el) el.remove();
}

// ─── 데이터 수집 ─────────────────────────────────────────────
function collectData() {
  const dept = document.getElementById('dept').value.trim();
  const month = document.getElementById('month').value;
  const author = document.getElementById('author').value.trim();
  const writeDate = document.getElementById('write-date').value.trim();

  const collectWorks = (type) => {
    const works = [];
    for (let i = 1; i <= workCounters[type]; i++) {
      const el = document.getElementById(`${type}-work-${i}`);
      if (!el) continue;
      const title = document.getElementById(`${type}-title-${i}`)?.value.trim();
      if (!title) continue;
      works.push({
        title,
        sub: document.getElementById(`${type}-sub-${i}`)?.value.trim() || '',
        datetime: document.getElementById(`${type}-datetime-${i}`)?.value.trim() || '',
        target: document.getElementById(`${type}-target-${i}`)?.value.trim() || '',
        content: document.getElementById(`${type}-content-${i}`)?.value.trim() || '',
        etc: document.getElementById(`${type}-etc-${i}`)?.value.trim() || '',
      });
    }
    return works;
  };

  const usageRows = [];
  for (let i = 1; i <= usageRowCount; i++) {
    const el = document.getElementById(`usage-row-${i}`);
    if (!el) continue;
    const name = document.getElementById(`usage-name-${i}`)?.value.trim();
    if (!name) continue;
    const months = [1,2,3,4,5,6,7].map(m => document.getElementById(`usage-m${m}-${i}`)?.value.trim() || '');
    usageRows.push({ name, months });
  }

  return {
    dept, month, author, writeDate,
    totalUsers: document.getElementById('total-users').value.trim(),
    coreWorks: collectWorks('core'),
    orgWorks: collectWorks('org'),
    bizWorks: collectWorks('biz'),
    usageRows,
  };
}

// ─── 미리보기 ─────────────────────────────────────────────────
function togglePreview() {
  const area = document.getElementById('preview-area');
  if (area.style.display === 'block') {
    area.style.display = 'none';
    return;
  }
  const d = collectData();
  if (!d.dept || !d.month) { showToast('기관명과 보고 월을 입력해주세요', true); return; }
  area.style.display = 'block';
  area.innerHTML = buildPreviewHTML(d);
  area.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildPreviewHTML(d) {
  const renderWorks = (works) => works.map(w => `
    <div class="work-item">
      <div class="work-title"> ${w.title}</div>
      ${w.sub ? `<div class="work-sub">  ➲ ${w.sub}</div>` : ''}
      ${w.datetime ? `<div class="work-detail">〇 <span>일시/장소:</span> ${w.datetime}</div>` : ''}
      ${w.target ? `<div class="work-detail">〇 <span>대　　상:</span> ${w.target}</div>` : ''}
      ${w.content ? `<div class="work-detail">〇 <span>주요내용:</span> ${w.content}</div>` : ''}
      ${w.etc ? `<div class="work-detail">〇 ${w.etc}</div>` : ''}
    </div>`).join('');

  return `
    <div class="doc-title">&lt;${d.month}월 월간업무보고&gt;</div>
    <div class="doc-dept">&lt;${d.dept}&gt;</div>
    ${d.coreWorks.length ? `<div class="section-title">□ 월간 핵심 주요업무</div>${renderWorks(d.coreWorks)}` : ''}
    ${d.orgWorks.length ? `<div class="section-title">□ 기관운영</div>${renderWorks(d.orgWorks)}` : ''}
    ${d.bizWorks.length ? `<div class="section-title">□ 사업운영</div>${renderWorks(d.bizWorks)}` : ''}
    ${d.usageRows.length ? `<div class="section-title">□ 공간 이용실적${d.totalUsers ? ` (${d.totalUsers})` : ''}</div>
    <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;">
      <thead><tr style="background:#f0f4f8;">
        <th style="border:1px solid #ccc;padding:8px;text-align:center;">구분</th>
        ${[1,2,3,4,5,6,7].map(m=>`<th style="border:1px solid #ccc;padding:8px;text-align:center;">${m}월</th>`).join('')}
        <th style="border:1px solid #ccc;padding:8px;text-align:center;">소계</th>
      </tr></thead>
      <tbody>${d.usageRows.map(r => {
        const total = r.months.reduce((s,v) => s + (parseInt(v)||0), 0);
        return `<tr>
          <td style="border:1px solid #ccc;padding:8px;text-align:center;font-weight:700;">${r.name}</td>
          ${r.months.map(v=>`<td style="border:1px solid #ccc;padding:8px;text-align:center;">${v||''}</td>`).join('')}
          <td style="border:1px solid #ccc;padding:8px;text-align:center;font-weight:700;">${total||''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>` : ''}
    ${d.author || d.writeDate ? `<div style="text-align:right;margin-top:24px;color:var(--muted);font-size:13px;">작성자: ${d.author} &nbsp; ${d.writeDate}</div>` : ''}`;
}

// ─── HWPX 생성 ───────────────────────────────────────────────
async function downloadHWPX() {
  const d = collectData();
  if (!d.dept) { showToast('기관(센터)명을 입력해주세요', true); return; }
  if (!d.month) { showToast('보고 월을 선택해주세요', true); return; }

  showToast('HWPX 파일 생성 중...');

  const xml = buildSectionXML(d);
  const hpf = buildHPF(d);
  const headerXML = buildHeaderXML();

  try {
    const zip = new JSZip();
    const mi = zip.folder('');
    zip.file('mimetype', 'application/hwp+zip', { compression: 'STORE' });
    zip.file('Contents/content.hpf', hpf);
    zip.file('Contents/header.xml', headerXML);
    zip.file('Contents/section/section0.xml', xml);
    zip.file('META-INF/container.xml', `<?xml version="1.0" encoding="UTF-8"?>
<container version="1.0" xmlns="urn:oasis:names:tc:opendocument:xmlns:container">
  <rootfiles>
    <rootfile full-path="Contents/content.hpf" media-type="application/oebps-package+xml"/>
  </rootfiles>
</container>`);

    const blob = await zip.generateAsync({ type: 'blob', mimeType: 'application/hwp+zip' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${d.month}월_월간업무보고_${d.dept}.hwpx`;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      URL.revokeObjectURL(url);
      a.remove();
    }, 1000);
    showToast('✅ 다운로드 완료!');
  } catch(e) {
    showToast('오류 발생: ' + e.message, true);
    console.error(e);
  }
}

// ─── HWPX XML 빌더 ───────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function para(text, style='본문', bold=false) {
  const rpr = bold ? `<hp:rPr><hp:bold/></hp:rPr>` : `<hp:rPr/>`;
  return `<hp:p>
  <hp:pPr><hp:pStyle hp:styleId="${esc(style)}"/></hp:pPr>
  <hp:run>${rpr}<hp:t>${esc(text)}</hp:t></hp:run>
</hp:p>`;
}

function buildSectionXML(d) {
  let body = '';
  body += para(`<${d.month}월 월간업무보고>`, '제목');
  body += para(`<${esc(d.dept)}>`, '본문');
  body += para('');

  const renderWorks = (works) => {
    let out = '';
    works.forEach(w => {
      out += para(` ${esc(w.title)}`, '헤드라인', true);
      if (w.sub) out += para(`  ➲ ${esc(w.sub)}`, '중고딕');
      if (w.datetime) out += para(` 〇 일시/장소: ${esc(w.datetime)}`, '본문');
      if (w.target) out += para(` 〇 대\u00a0\u00a0\u00a0\u00a0상: ${esc(w.target)}`, '본문');
      if (w.content) out += para(` 〇 주요내용: ${esc(w.content)}`, '본문');
      if (w.etc) out += para(` 〇 ${esc(w.etc)}`, '본문');
      out += para('');
    });
    return out;
  };

  if (d.coreWorks.length) {
    body += para('□ 월간 핵심 주요업무', '본문', true);
    body += renderWorks(d.coreWorks);
  }
  if (d.orgWorks.length) {
    body += para('□ 기관운영', '본문', true);
    body += renderWorks(d.orgWorks);
  }
  if (d.bizWorks.length) {
    body += para('□ 사업운영', '본문', true);
    body += renderWorks(d.bizWorks);
  }

  if (d.usageRows.length) {
    const totalLabel = d.totalUsers ? ` (${esc(d.totalUsers)})` : '';
    body += para(`□ 공간 이용실적${totalLabel}`, '본문', true);
    // 이용실적 표 (간이 텍스트 형태로)
    const header = ['구분','1월','2월','3월','4월','5월','6월','7월','소계'].join('\t');
    body += para(header, '표내용');
    d.usageRows.forEach(r => {
      const total = r.months.reduce((s,v)=>s+(parseInt(v)||0),0);
      const row = [r.name, ...r.months, total||''].join('\t');
      body += para(row, '표내용');
    });
    body += para('');
  }

  if (d.author || d.writeDate) {
    body += para(`작성자: ${esc(d.author)}　　${esc(d.writeDate)}`, '본문');
  }

  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<hs:sec xmlns:hs="http://www.hancom.co.kr/hwpml/2012/section"
        xmlns:hp="http://www.hancom.co.kr/hwpml/2012/paragraph">
  <hs:secPr>
    <hs:pgSz hp:w="59528" hp:h="84188"/>
    <hs:pgMar hp:left="8504" hp:right="8504" hp:top="5668" hp:bottom="4252"
              hp:header="4252" hp:footer="4252" hp:gutter="0"/>
  </hs:secPr>
${body}
</hs:sec>`;
}

function buildHPF(d) {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<opf:package xmlns:opf="http://www.idpf.org/2007/opf" version="2.0">
  <opf:metadata>
    <dc:title xmlns:dc="http://purl.org/dc/elements/1.1/">${esc(d.month)}월 월간업무보고 - ${esc(d.dept)}</dc:title>
    <dc:creator xmlns:dc="http://purl.org/dc/elements/1.1/">${esc(d.author)}</dc:creator>
  </opf:metadata>
  <opf:manifest>
    <opf:item id="header" href="header.xml" media-type="application/xml"/>
    <opf:item id="section0" href="section/section0.xml" media-type="application/xml"/>
  </opf:manifest>
  <opf:spine>
    <opf:itemref idref="section0"/>
  </opf:spine>
</opf:package>`;
}

function buildHeaderXML() {
  return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<hh:head xmlns:hh="http://www.hancom.co.kr/hwpml/2012/head">
  <hh:beginNum page="1" footnote="1" endnote="1" pic="1" tbl="1" equation="1"/>
  <hh:refList>
    <hh:fontfaces>
      <hh:fontface hh:lang="ko">
        <hh:font hh:name="함초롬바탕" hh:type="TTF"/>
        <hh:font hh:name="맑은 고딕" hh:type="TTF"/>
      </hh:fontface>
    </hh:fontfaces>
    <hh:styles>
      <hh:style hh:type="para" hh:styleId="본문" hh:name="본문"/>
      <hh:style hh:type="para" hh:styleId="제목" hh:name="제목"/>
      <hh:style hh:type="para" hh:styleId="헤드라인" hh:name="헤드라인"/>
      <hh:style hh:type="para" hh:styleId="중고딕" hh:name="중고딕"/>
      <hh:style hh:type="para" hh:styleId="표내용" hh:name="표내용"/>
    </hh:styles>
  </hh:refList>
  <hh:compatibleDocument targetProgram="HWP201X"/>
</hh:head>`;
}

// ─── 알림 토스트 ─────────────────────────────────────────────
function showToast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? 'var(--danger)' : 'var(--success)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─── 초기 항목 자동 추가 ─────────────────────────────────────
window.addEventListener('load', () => {
  addWork('core');
  addWork('org');
  addUsageRow();
  // 오늘 날짜 자동 입력
  const now = new Date();
  document.getElementById('write-date').value =
    `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()}.`;
});
</script>
